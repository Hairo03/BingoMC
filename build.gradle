plugins {
  id 'java'
}

group = 'com.hairo.bingomc'
version = '1.0.0-SNAPSHOT'

repositories {
  maven {
    name = 'papermc'
    url = uri('https://repo.papermc.io/repository/maven-public/')
  }
  maven {
    name = 'onarandombox'
    url = uri('https://repo.onarandombox.com/content/groups/public/')
  }
  mavenCentral()
}

dependencies {
  compileOnly 'io.papermc.paper:paper-api:1.21.4-R0.1-SNAPSHOT'
  compileOnly 'org.mvplugins.multiverse.core:multiverse-core:5.5.3'
  compileOnly 'org.mvplugins.multiverse.netherportals:multiverse-netherportals:5.0.4'
  compileOnly 'org.mvplugins.multiverse.inventories:multiverse-inventories:5.3.2'
}

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(21)
  }
}

tasks.withType(JavaCompile).configureEach {
  options.encoding = 'UTF-8'
}